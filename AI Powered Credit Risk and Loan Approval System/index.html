{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-lg p-5">
            <h2 class="text-center mb-4">Apply for Personal Loan</h2>
            <form action="/predict" method="POST">
                <div class="row">
                    <div class="col-md-6 mb-3"><input type="text" class="form-control" name="name" placeholder="Full Name" required></div>
                    <div class="col-md-6 mb-3"><input type="email" class="form-control" name="email" placeholder="Email" required></div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3"><input type="number" class="form-control" name="age" placeholder="Age" required></div>
                    <div class="col-md-6 mb-3"><input type="number" class="form-control" name="income" placeholder="Annual Income (₹)" required></div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3"><input type="number" class="form-control" name="job_stability" placeholder="Job Stability (years)" required></div>
                    <div class="col-md-6 mb-3"><input type="number" class="form-control" name="loan_amount" placeholder="Requested Loan (₹)" required></div>
                </div>
                <div class="mb-4">
                    <label class="form-label">Credit History (0=Good, 1=Bad)</label>
                    <input type="number" class="form-control" name="credit_history" min="0" max="1" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100">Get Instant Decision</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
